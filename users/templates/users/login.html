{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% block head %}
    <title>Login</title>
    <!-- Tell Google to completely ignore this private page -->
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}
{% block content %}
    <form method="post">  
        {% csrf_token %}
        {{ form|crispy }}
        <button id="login" type="submit">Log In</button>
    </form>
{% endblock %}
