{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'Pictures/favicons/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'Pictures/favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'Pictures/favicons/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'Pictures/favicons/site.webmanifest' %}">
    {% block head %}
    {% endblock %}

    {% block meta %}
        <!-- Meta tags -->
        <meta property="og:title" content="Dulwich College Beijing | DCB Lions sport website">
        <meta name="description" content="Official sports website for the DCB Lions. View upcoming schedules, live match results, team rosters, and athletic news.">
        <meta property="og:description" content="Official sports website for DCB. View schedules, results, and team information">
        <meta property="og:image" content="{% static 'Pictures/GOAT.jpg' %}">
    {% endblock %}
    
    <link rel="stylesheet" href="{% static 'css/base.css'%}">
    
</head>

<body>
    
    <!-- Nav bar -->
  <nav>
    <a href="{% url 'index-page' %}" class="home-link">
        <div class="dcb-lions">
            <img class="logo" src="{% static 'Pictures/Lions_logo.svg'%}" alt="Lions logo" >
            <h1 class="name">DCB Lions</h1>
        </div>
    </a>
    <input type="checkbox" id="sidebar-active">
    <label for="sidebar-active" class="open-sidebar-button" aria-label="Open menu">
      <svg xmlns="http://www.w3.org/2000/svg" height="32" viewBox="0 -960 960 960" width="32"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
    </label>
    <label id="overlay" for="sidebar-active"></label>
    <div class="links-container">
      <label for="sidebar-active" class="close-sidebar-button" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" height="32" viewBox="0 -960 960 960" width="32"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
      </label>

      <!-- NAV bar -->
        <a class="mobile-view" href="{% url 'index-page' %}">Home</a>
        <a class="mobile-view" href="{% url 'team-list' %}">Teams</a>
        <a class="mobile-view" href="{% url 'legends' %}">Legends</a>
        <a class="mobile-view" href="{% url 'past-seasons' %}">Past seasons</a>
    </div>
  </nav>
    
    <!-- Messages -->
    <div id="content">
        {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
                  <button type="button" class="close" data-dismiss="alert" aria-label="Close" onclick="this.parentElement.remove()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Actual content block -->
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <p>Beensauce, iq_is_2, Metop</p>
    </footer>
</body>
</html>
